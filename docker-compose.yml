# Bikeapelago local development compose
#
# Usage:
#   docker compose up                                        # Bikeapelago PostGIS database only (run API with dotnet run)
#   docker compose --profile api up                         # + containerized .NET API
#   docker compose --profile frontend up                    # + React dev frontend + admin dev UI
#   docker compose --profile prod-frontend up               # + React PROD frontend + admin PROD UI (Nginx)
#   docker compose --profile archipelago up                 # + local Archipelago server
#   docker compose --profile api --profile frontend up      # full app stack (dev)
#
# To run EVERYTHING with a single command, add this to your .env:
#   COMPOSE_PROFILES=api,frontend,archipelago
# Then just: docker compose up
#
# For OrbStack "Production" deployment (hit deployed API):
#   1. Set API_PROXY_URL=https://your-api-domain.com/api/ in .env
#   2. Set API_HUBS_URL=https://your-api-domain.com/hubs/ in .env
#   3. docker compose --profile prod-frontend up -d
#
# Copy .env.example to .env and fill in required values before starting.
# Note: Bikeapelago database container (postgis-bikeapelago) always starts.
#       OSM Discovery database is shared infrastructure accessed via reverse proxy.

x-bikeapelago-frontend-app-definition: &frontend-app-definition
  build:
    context: ./frontend
    dockerfile: Dockerfile.dev
  volumes:
    - ./frontend:/usr/src/app
    - bikeapelago_node_modules:/usr/src/app/node_modules
  working_dir: /usr/src/app
  restart: unless-stopped
  networks:
    - bikeapelago
  environment:
    VITE_PUBLIC_API_URL: http://bikeapelago-api:5054

networks:
  bikeapelago:
    name: bikeapelago

volumes:
  bikeapelago_node_modules:
  bikeapelago_postgis_data:
  osm_postgis_data:
    # name: avarts_postgis_data # CRITICAL: This perfectly maps back to the existing OrbStack volume!
    # external: true

services:

  # ──────────────────────────────────────────────────────────────────────────
  # OSM Discovery Database (The "Big" PostGIS) — profile: osm
  # ──────────────────────────────────────────────────────────────────────────
  postgis-osm:
    image: postgis/postgis:16-3.4-alpine
    container_name: postgis-osm-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: osm_discovery
      POSTGRES_USER: ${OSM_DISCOVERY_USER:-osm}
      POSTGRES_PASSWORD: ${OSM_DISCOVERY_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - osm_postgis_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago PostGIS Database (App Data)
  # ──────────────────────────────────────────────────────────────────────────
  postgis-bikeapelago:
    image: postgis/postgis:16-3.4
    container_name: postgis-bikeapelago-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-osm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bikeapelago
    ports:
      - "${DB_BIKEAPELAGO_PORT:-5432}:5432"
    volumes:
      - bikeapelago_postgis_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-osm} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago API — profile: api
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-api:
    build:
      context: .
      dockerfile: ./api/Dockerfile.dev
    image: bikeapelago-api:latest
    container_name: bikeapelago-api-dev
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Mapbox__ApiKey=${MAPBOX_API_KEY}
      - JWT_KEY=${JWT_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ConnectionStrings__PostGis=Host=postgis-bikeapelago;Port=5432;Database=bikeapelago;Username=${DB_USER:-osm};Password=${DB_PASSWORD}
      - ConnectionStrings__OsmDiscovery=Host=postgis-osm;Port=5432;Database=osm_discovery;Username=${OSM_DISCOVERY_USER:-osm};Password=${OSM_DISCOVERY_PASSWORD}
    ports:
      - "5054:8080"
    depends_on:
      postgis-bikeapelago:
        condition: service_healthy
    networks:
      - bikeapelago
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago React frontend — profile: frontend
  # ──────────────────────────────────────────────────────────────────────────
  frontend_builder:
    <<: *frontend-app-definition
    restart: no
    command: pnpm install
  bikeapelago-react:
    <<: *frontend-app-definition
    command: pnpm --filter "@bikeapelago/bikeapelago-app" run dev --host
    depends_on:
      bikeapelago-api:
        condition: service_started
      frontend_builder:
        condition: service_completed_successfully
    ports:
      - "18182:5173"

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago Admin UI — profile: frontend
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-admin:
    <<: *frontend-app-definition
    container_name: bikeapelago-admin-dev
    command: pnpm --filter "@bikeapelago/admin-ui" run dev --host
    ports:
      - "18183:5173"
    depends_on:
      bikeapelago-api:
        condition: service_started
      frontend_builder:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────────────────────────────────
  # Archipelago — profile: archipelago  (OPTIONAL)
  # Drop player YAMLs in ../../archipelago/config/
  # Generated seeds appear in ../../archipelago/output/
  # Requires the archipelago/ directory to exist alongside this repo.
  # ──────────────────────────────────────────────────────────────────────────
  archipelago:
    profiles: [archipelago]
    build:
      context: ../
      dockerfile: ./archipelago/Dockerfile
    image: archipelago-bikeapelago:latest
    container_name: archipelago-dev
    restart: unless-stopped
    ports:
      - "38281:38281"
    volumes:
      - ../archipelago/config:/config
      - ../archipelago/output:/output
    environment:
      - AP_PORT=38281
    networks:
      - bikeapelago
