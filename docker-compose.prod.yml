# Bikeapelago prod development compose
#
# Usage:
#   docker compose up                                        # Bikeapelago PostGIS database only (run API with dotnet run)
#   docker compose -f ./docker-compose.prod.yml --profile prod-frontend up               # + React PROD frontend + admin PROD UI (Nginx)
#
# For OrbStack "Production" deployment (hit deployed API):
#   1. Set API_PROXY_URL=https://your-api-domain.com/api/ in .env
#   2. Set API_HUBS_URL=https://your-api-domain.com/hubs/ in .env
#   3. docker compose --profile prod-frontend up -d
#

x-bikeapelago-frontend-prod-definition: &frontend-prod-definition
  profiles: [prod-frontend]
  build:
    context: ./frontend
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - bikeapelago-prod
  environment:
    API_PROXY_URL: ${API_PROXY_URL:-http://prod-bikeapelago-api:8080/api/}
    API_HUBS_URL: ${API_HUBS_URL:-http://prod-bikeapelago-api:8080/hubs/}

networks:
  bikeapelago:
    name: bikeapelago
    external: true

volumes:
  bikeapelago_postgis_data:
  osm_postgis_data:
    name: avarts_postgis_data # CRITICAL: This perfectly maps back to the existing OrbStack volume!
    external: true

services:

  # ──────────────────────────────────────────────────────────────────────────
  # OSM Discovery Database (The "Big" PostGIS) — profile: osm
  # ──────────────────────────────────────────────────────────────────────────
  postgis-osm:
    profiles: [osm]
    image: postgis/postgis:16-3.4-alpine
    container_name: postgis-osm-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: osm_discovery
      POSTGRES_USER: ${OSM_DISCOVERY_USER:-osm}
      POSTGRES_PASSWORD: ${OSM_DISCOVERY_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - osm_postgis_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago PostGIS Database (App Data)
  # ──────────────────────────────────────────────────────────────────────────
  postgis-bikeapelago:
    image: postgis/postgis:16-3.4
    container_name: postgis-bikeapelago-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-osm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bikeapelago
    ports:
      - "${DB_BIKEAPELAGO_PORT:-5432}:5432"
    volumes:
      - bikeapelago_postgis_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-osm} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago API — profile: api
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-api:
    profiles: [api]
    build:
      context: .
      dockerfile: ./api/Dockerfile.dev
    image: bikeapelago-api:latest
    container_name: bikeapelago-api-dev
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Mapbox__ApiKey=${MAPBOX_API_KEY}
      - JWT_KEY=${JWT_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ConnectionStrings__PostGis=Host=postgis-bikeapelago;Port=5432;Database=bikeapelago;Username=${DB_USER:-osm};Password=${DB_PASSWORD}
      - ConnectionStrings__OsmDiscovery=Host=postgis-osm;Port=5432;Database=osm_discovery;Username=${OSM_DISCOVERY_USER:-osm};Password=${OSM_DISCOVERY_PASSWORD}
    ports:
      - "5054:8080"
    depends_on:
      postgis-bikeapelago:
        condition: service_healthy
    networks:
      - bikeapelago

  # ──────────────────────────────────────────────────────────────────────────
  # PRODUCTION Frontends (OrbStack/Deploy)
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-react-prod:
    <<: *frontend-prod-definition
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime-frontend
    container_name: bikeapelago-react-prod
    ports:
      - "8182:80"

  bikeapelago-admin-prod:
    <<: *frontend-prod-definition
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime-admin-ui
    container_name: bikeapelago-admin-prod
    ports:
      - "8183:80"
