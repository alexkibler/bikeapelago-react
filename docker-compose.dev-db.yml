x-bikeapelago-frontend-app-definition: &frontend-app-definition
  platform: linux/amd64
  restart: unless-stopped
  networks:
    - bikeapelago
  environment:
    API_PROXY_URL: ${DEV_API_PROXY_URL:-http://bikeapelago-api-dev:5054/api/}
    API_HUBS_URL: ${DEV_API_HUBS_URL:-http://bikeapelago-api-dev:5054/hubs/}

services:
  # ──────────────────────────────────────────────────────────────────────────
  # OSM Discovery Database (The "Prod" Data for Dev work)
  # ──────────────────────────────────────────────────────────────────────────
  postgis-osm:
    image: postgis/postgis:16-3.4-alpine
    container_name: postgis-osm-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: osm_discovery
      POSTGRES_USER: ${OSM_DISCOVERY_USER:-osm}
      POSTGRES_PASSWORD: ${OSM_DISCOVERY_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - osm_postgis_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago Dev Database (App Data)
  # ──────────────────────────────────────────────────────────────────────────
  postgis-bikeapelago-new:
    image: postgis/postgis:16-3.4
    container_name: postgis-bikeapelago-new
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-osm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bikeapelago_new
    ports:
      - "5435:5432"
    volumes:
      - bikeapelago_new_data:/var/lib/postgresql/data
    networks:
      - bikeapelago
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-osm} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago Dev API (containerized dev stack)
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-api-dev:
    image: ghcr.io/alexkibler/bikeapelago-react/api:latest
    platform: linux/amd64
    container_name: bikeapelago-api-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5054
      Mapbox__ApiKey: ${MAPBOX_API_KEY}
      JWT_KEY: ${JWT_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ConnectionStrings__PostGis: Host=postgis-bikeapelago-new;Port=5432;Database=bikeapelago_new;Username=${DB_USER:-osm};Password=${DB_PASSWORD}
      ConnectionStrings__OsmDiscovery: Host=postgis-osm;Port=5432;Database=osm_discovery;Username=${OSM_DISCOVERY_USER:-osm};Password=${OSM_DISCOVERY_PASSWORD}
      AllowedOrigins__0: ${DEV_ALLOWED_ORIGIN_0:-http://localhost:8193}
      AllowedOrigins__1: ${DEV_ALLOWED_ORIGIN_1:-http://localhost:8194}
      AllowedOrigins__2: ${DEV_ALLOWED_ORIGIN_2:-https://bikeapelago-dev.alexkibler.com}
      AllowedOrigins__3: ${DEV_ALLOWED_ORIGIN_3:-https://admin-bikeapelago-dev.alexkibler.com}
      AllowedOrigins__4: ${DEV_ALLOWED_ORIGIN_4:-capacitor://localhost}
    ports:
      - "5055:5054"
    depends_on:
      postgis-bikeapelago-new:
        condition: service_healthy
      postgis-osm:
        condition: service_healthy
    networks:
      - bikeapelago

  # ──────────────────────────────────────────────────────────────────────────
  # Bikeapelago Dev Frontends (published runtime images)
  # ──────────────────────────────────────────────────────────────────────────
  bikeapelago-react-dev:
    <<: *frontend-app-definition
    image: ghcr.io/alexkibler/bikeapelago-react/frontend:latest
    container_name: bikeapelago-react-dev
    depends_on:
      bikeapelago-api-dev:
        condition: service_started
    ports:
      - "8193:80"

  bikeapelago-admin-dev:
    <<: *frontend-app-definition
    image: ghcr.io/alexkibler/bikeapelago-react/admin-ui:latest
    container_name: bikeapelago-admin-dev
    depends_on:
      bikeapelago-api-dev:
        condition: service_started
    ports:
      - "8194:80"

volumes:
  bikeapelago_new_data:
  osm_postgis_data:
    name: avarts_postgis_data
    external: true

networks:
  bikeapelago:
    external: true
